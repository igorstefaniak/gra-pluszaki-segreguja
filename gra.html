<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluszaki segregują</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗑️</text></svg>">
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #29b6f6 0%, #81d4fa 50%, #9ccc65 50%, #4caf50 100%);
            height: 100vh;
        }

        #start-screen, #feedback-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            background: linear-gradient(to bottom, #29b6f6 0%, #81d4fa 50%, #9ccc65 50%, #4caf50 100%);
        }

        #feedback-screen {
            display: none;
            z-index: 300;
        }

        .big-bear-emoji {
            font-size: 150px;
            animation: wobble 2s infinite ease-in-out;
            margin-bottom: 20px;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.2));
        }

        .bubble-text {
            background: #fff;
            border: 5px dashed #0288d1;
            border-radius: 30px;
            padding: 25px 40px;
            font-size: 32px;
            font-weight: bold;
            max-width: 600px;
            text-align: center;
            box-shadow: 6px 6px 0px #4fc3f7;
            line-height: 1.5;
            color: #01579b;
        }

        #start-btn {
            background: #f4511e;
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 5px 5px 0px #bf360c;
            transition: transform 0.2s;
            border: 5px dashed #fff;
            margin-top: 30px;
        }

        #start-btn:active {
            transform: scale(0.95) translate(2px, 2px);
            box-shadow: 2px 2px 0px #bf360c;
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            height: 80px;
            z-index: 100;
            position: relative;
        }

        #bear-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #bear {
            font-size: 45px;
            animation: wobble 2s infinite ease-in-out;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        #bubble {
            background: #fff;
            border: 3px dashed #03a9f4;
            border-radius: 15px;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            color: #0277bd;
            box-shadow: 3px 3px 0px #e1f5fe;
        }

        #score {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
            background: #d81b60;
            padding: 8px 20px;
            border-radius: 20px;
            border: 3px dashed #fff;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        #game-area {
            position: relative;
            width: 100vw;
            height: calc(100vh - 100px);
            overflow: hidden;
            border-top: 6px dashed #fff;
        }

        .tree {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .tree-trunk {
            width: 25px;
            height: 70px;
            background: linear-gradient(to right, #6d4c41, #8d6e63);
            border-radius: 5px;
            z-index: 1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .tree-foliage {
            width: 140px;
            height: 130px;
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            background: linear-gradient(to bottom right, #66bb6a, #388e3c);
            margin-bottom: -25px;
            z-index: 2;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
        }

        .tree-1 {
            left: 10%;
            bottom: 250px;
            transform: scale(0.8);
            z-index: 5;
        }

        .tree-2 {
            left: 45%;
            bottom: 300px;
            transform: scale(0.6);
            z-index: 4;
        }

        .tree-3 {
            right: 10%;
            bottom: 220px;
            transform: scale(1.1);
            z-index: 6;
        }

        #falling-item {
            position: absolute;
            cursor: grab;
            user-select: none;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            z-index: 50;
            touch-action: none;
            top: 0;
            left: 0;
            transition: transform 0.1s linear;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #falling-icon {
            font-size: 70px;
        }

        #falling-label {
            font-size: 16px;
            font-weight: bold;
            background: rgba(255, 255, 255, 1);
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 5px;
            color: #333;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            border: 2px solid #0288d1;
        }

        .bins-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 10;
        }

        .bin {
            width: 11vw;
            max-width: 80px;
            height: 120px;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            font-weight: bold;
            font-size: 10px;
            position: relative;
            box-shadow: inset -10px 0 15px rgba(0, 0, 0, 0.2), 0 5px 10px rgba(0, 0, 0, 0.1);
            transition: filter 0.2s;
            text-align: center;
            word-wrap: break-word;
        }

        .bin::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -5px;
            right: -5px;
            height: 15px;
            border-radius: 5px;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.2);
            z-index: 2;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: right bottom;
        }

        .bin::after {
            content: '♻️';
            position: absolute;
            top: 30px;
            font-size: 25px;
            opacity: 0.3;
            pointer-events: none;
        }

        .bin.open { filter: brightness(1.1); }
        .bin.open::before { transform: rotate(30deg) translateY(-10px) translateX(5px); }

        .blue { background-color: #1976d2; }
        .blue::before { background-color: #1565c0; }
        .yellow { background-color: #fbc02d; color: #424242; }
        .yellow::before { background-color: #f9a825; }
        .green { background-color: #388e3c; }
        .green::before { background-color: #2e7d32; }
        .brown-real { background-color: #6d4c41; }
        .brown-real::before { background-color: #5d4037; }
        .black { background-color: #455a64; }
        .black::before { background-color: #37474f; }
        .orange { background-color: #f57c00; }
        .orange::before { background-color: #e65100; }
        .purple { background-color: #7b1fa2; }
        .purple::before { background-color: #4a148c; }
        .red { background-color: #d32f2f; }
        .red::before { background-color: #b71c1c; }
    </style>
</head>

<body>

<div id="start-screen">
    <div class="big-bear-emoji">🧸</div>
    <div class="bubble-text">Cześć! Jestem Miś. Pomóż mi posprzątać naszą polanę! Łap śmieci i wrzucaj je do koszy.</div>
    <button id="start-btn">Zaczynamy!</button>
</div>

<div id="feedback-screen">
    <div id="feedback-bear" class="big-bear-emoji">🧸</div>
    <div id="feedback-msg" class="bubble-text"></div>
</div>

<div id="header">
    <div id="bear-box">
        <div id="bear">🧸</div>
        <div id="bubble">Łap w locie!</div>
    </div>
    <div id="score">⭐ 0</div>
</div>

<div id="game-area">
    <div class="tree tree-1">
        <div class="tree-foliage"></div>
        <div class="tree-trunk"></div>
    </div>
    <div class="tree tree-2">
        <div class="tree-foliage"></div>
        <div class="tree-trunk"></div>
    </div>
    <div class="tree tree-3">
        <div class="tree-foliage"></div>
        <div class="tree-trunk"></div>
    </div>

    <div id="falling-item">
        <div id="falling-icon"></div>
        <div id="falling-label"></div>
    </div>
    <div class="bins-container">
        <div class="bin blue" data-cat="papier">PAPIER</div>
        <div class="bin yellow" data-cat="plastik">PLASTIK</div>
        <div class="bin green" data-cat="szklo">SZKŁO</div>
        <div class="bin brown-real" data-cat="bio">BIO</div>
        <div class="bin black" data-cat="zmieszane">ZMIESZANE</div>
        <div class="bin orange" data-cat="niebezpieczne">NIEBEZPIECZNE</div>
        <div class="bin purple" data-cat="tekstylia">TEKSTYLIA</div>
        <div class="bin red" data-cat="elektrośmieci">ELEKTROŚMIECI</div>
    </div>
</div>

<script>
    const data = [
        { icon: '📦', name: 'Karton', cat: 'papier' },
        { icon: '🥤', name: 'Kubek po napoju', cat: 'plastik' },
        { icon: '🫙', name: 'Słoik', cat: 'szklo' },
        { icon: '🍌', name: 'Skórka', cat: 'bio' },
        { icon: '🗞️', name: 'Gazeta', cat: 'papier' },
        { icon: '🥫', name: 'Puszka', cat: 'plastik' },
        { icon: '🍎', name: 'Ogryzek', cat: 'bio' },
        { icon: '🍼', name: 'Butelka szklana', cat: 'szklo' },
        { icon: '🦴', name: 'Kość', cat: 'zmieszane' },
        { icon: '📝', name: 'Zeszyt', cat: 'papier' },
        { icon: '🧴', name: 'Opakowanie po szamponie', cat: 'plastik' },
        { icon: '🍬', name: 'Papierek po cukierku', cat: 'plastik' },
        { icon: '☕', name: 'Fusy', cat: 'bio' },
        { icon: '🥛', name: 'Karton po mleku', cat: 'plastik' },
        { icon: '🥚', name: 'Skorupki', cat: 'bio' },
        { icon: '🧹', name: 'Kurz', cat: 'zmieszane' },
        { icon: '🍂', name: 'Liście', cat: 'bio' },
        { icon: '🪵', name: 'Gałązki', cat: 'bio' },
        { icon: '🐟', name: 'Ryba', cat: 'zmieszane' },
        { icon: '🎨', name: 'Opakowanie po farbach', cat: 'niebezpieczne' },
        { icon: '👕', name: 'Ubrania', cat: 'tekstylia' },
        { icon: '💡', name: 'Żarówka', cat: 'elektrośmieci' },
        { icon: '🧸', name: 'Zabawki plastikowe', cat: 'zmieszane' }
    ];

    let current = {};
    let points = 0;
    let y = -100;
    let x = 0;
    let speed = 0.5;
    let isDragging = false;
    let animationId;
    let isPaused = false;

    const gameArea = document.getElementById('game-area');
    const itemEl = document.getElementById('falling-item');
    const iconEl = document.getElementById('falling-icon');
    const labelEl = document.getElementById('falling-label');
    const bins = document.querySelectorAll('.bin');
    const scoreDisplay = document.getElementById('score');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const feedbackScreen = document.getElementById('feedback-screen');
    const feedbackMsg = document.getElementById('feedback-msg');
    const feedbackBear = document.getElementById('feedback-bear');

    startBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        startSpawn();
    });

    function startSpawn() {
        if (isPaused) return;
        const randomIndex = Math.floor(Math.random() * data.length);
        current = data[randomIndex];
        iconEl.innerText = current.icon;
        labelEl.innerText = current.name;

        const areaWidth = gameArea.clientWidth;
        x = Math.random() * (areaWidth - 100) + 10;
        y = -100;
        speed = 0.5 + (points * 0.05);

        itemEl.style.transform = `translate(${x}px, ${y}px)`;
        itemEl.style.display = 'flex';
        isDragging = false;

        loop();
    }

    function showFeedback(isCorrect) {
        isPaused = true;
        cancelAnimationFrame(animationId);
        itemEl.style.display = 'none';

        if (isCorrect) {
            feedbackMsg.innerText = "Brawo! Świetnie segregujesz! ✨";
            feedbackMsg.style.color = "#2e7d32";
            feedbackMsg.style.borderColor = "#4caf50";
            feedbackBear.innerText = "🥳";
        } else {
            feedbackMsg.innerText = "Ojej! To nie ten kosz. Spróbuj jeszcze raz! ❌";
            feedbackMsg.style.color = "#c62828";
            feedbackMsg.style.borderColor = "#e53935";
            feedbackBear.innerText = "😟";
        }

        feedbackScreen.style.display = 'flex';

        setTimeout(() => {
            feedbackScreen.style.display = 'none';
            isPaused = false;
            startSpawn();
        }, 2000);
    }

    function updateBinsOpenState(itemRect) {
        const itemCenterX = itemRect.left + (itemRect.width / 2);
        bins.forEach(bin => {
            const binRect = bin.getBoundingClientRect();
            if (itemCenterX > binRect.left - 20 && itemCenterX < binRect.right + 20 && itemRect.bottom > binRect.top - 80 && itemRect.top < binRect.bottom) {
                bin.classList.add('open');
            } else {
                bin.classList.remove('open');
            }
        });
    }

    function checkHit() {
        const itemRect = itemEl.getBoundingClientRect();
        const areaRect = gameArea.getBoundingClientRect();

        updateBinsOpenState(itemRect);

        if (isDragging) return false;

        if (itemRect.bottom >= areaRect.bottom - 120) {
            for (let bin of bins) {
                const binRect = bin.getBoundingClientRect();
                const itemCenterX = itemRect.left + (itemRect.width / 2);

                if (itemCenterX > binRect.left && itemCenterX < binRect.right && itemRect.bottom > binRect.top) {
                    const correct = current.cat === bin.dataset.cat;
                    points = correct ? points + 1 : Math.max(0, points - 1);
                    scoreDisplay.innerText = "⭐ " + points;
                    showFeedback(correct);
                    return true;
                }
            }
        }

        if (itemRect.top > areaRect.bottom) {
            points = Math.max(0, points - 1);
            scoreDisplay.innerText = "⭐ " + points;
            showFeedback(false);
            return true;
        }

        return false;
    }

    function loop() {
        if (isPaused) return;
        if (!isDragging) {
            y += speed;
            itemEl.style.transform = `translate(${x}px, ${y}px)`;
        }

        if (!checkHit()) {
            animationId = requestAnimationFrame(loop);
        }
    }

    itemEl.addEventListener('pointerdown', (e) => {
        if (isPaused) return;
        isDragging = true;
        itemEl.setPointerCapture(e.pointerId);
    });

    itemEl.addEventListener('pointermove', (e) => {
        if (isDragging && !isPaused) {
            const areaRect = gameArea.getBoundingClientRect();
            x = e.clientX - areaRect.left - (itemEl.clientWidth / 2);
            y = e.clientY - areaRect.top - (itemEl.clientHeight / 2);
            itemEl.style.transform = `translate(${x}px, ${y}px)`;
            updateBinsOpenState(itemEl.getBoundingClientRect());
        }
    });

    itemEl.addEventListener('pointerup', (e) => {
        isDragging = false;
        if (!isPaused) itemEl.releasePointerCapture(e.pointerId);
    });
</script>
</body>
</html>
